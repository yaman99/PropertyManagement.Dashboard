<div class="login-container" dir="rtl">
  <div class="login-card card shadow-lg">
    <div class="card-body p-5">
      <!-- Logo and Title -->
      <div class="text-center mb-4">
        <img src="/assets/branding/logo-white-bg-with-name.jpeg" alt="Omar Almarbie Real Estate" class="app-logo mb-3">
        <p class="text-muted">نظام إدارة الأملاك</p>
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="username" class="form-label">اسم المستخدم</label>
          <input
            type="text"
            class="form-control form-control-lg"
            id="username"
            formControlName="username"
            placeholder="أدخل اسم المستخدم"
            [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">كلمة المرور</label>
          <input
            type="password"
            class="form-control form-control-lg"
            id="password"
            formControlName="password"
            placeholder="أدخل كلمة المرور"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-lg w-100"
          [disabled]="loading$ | async">
          <span *ngIf="!(loading$ | async)">تسجيل الدخول</span>
          <span *ngIf="loading$ | async">
            <span class="spinner-border spinner-border-sm me-2"></span>
            جاري تسجيل الدخول...
          </span>
        </button>
      </form>

      <!-- Demo Accounts -->
      <div class="mt-4">
        <hr>
        <p class="text-muted small text-center mb-2">حسابات تجريبية:</p>
        <div class="demo-accounts">
          <small class="d-block">👤 <strong>مدير:</strong> admin / admin</small>
          <small class="d-block">💼 <strong>محاسب:</strong> accountant / accountant</small>
          <small class="d-block">🏠 <strong>مالك:</strong> owner1 / owner1</small>
          <small class="d-block">🔑 <strong>مستأجر:</strong> renter1 / renter1</small>
        </div>
      </div>
    </div>
  </div>
</div>

<app-page-header
  title="إدارة الملاك"
  icon="👤"
  [breadcrumbs]="[{label: 'الملاك'}]">
  <div actions>
    <button
      *appHasPermission="[Permission.OWNERS_WRITE]"
      class="btn btn-brand"
      [routerLink]="['new']">
      <i class="bi bi-plus-lg"></i> إضافة مالك جديد
    </button>
  </div>
</app-page-header>

<!-- Filters -->
<div class="card mb-4" dir="rtl">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">البحث</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="searchTerm"
          placeholder="ابحث بالاسم، البريد، الهاتف، أو الهوية...">
      </div>
      <div class="col-md-4">
        <label class="form-label">الحالة</label>
        <select class="form-select" [(ngModel)]="statusFilter">
          <option value="All">الكل</option>
          <option value="Active">نشط</option>
          <option value="Inactive">غير نشط</option>
          <option value="Suspended">موقوف</option>
        </select>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-outline-secondary w-100" (click)="clearFilters()">
          مسح الفلاتر
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div *ngIf="loading$ | async" class="text-center py-5">
  <div class="spinner-border text-brand" role="status">
    <span class="visually-hidden">جاري التحميل...</span>
  </div>
</div>

<!-- Owners Table -->
<div *ngIf="!(loading$ | async)" class="card" dir="rtl">
  <div class="card-body">
    <ng-container *ngIf="(filteredOwners$ | async) as owners">
      <div *ngIf="owners.length === 0">
        <app-empty-state
          icon="👤"
          title="لا يوجد ملاك"
          message="لم يتم العثور على أي ملاك. ابدأ بإضافة مالك جديد">
          <button
            *appHasPermission="[Permission.OWNERS_WRITE]"
            class="btn btn-brand"
            [routerLink]="['new']">
            <i class="bi bi-plus-lg"></i> إضافة مالك جديد
          </button>
        </app-empty-state>
      </div>

      <div *ngIf="owners.length > 0" class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>الاسم الكامل</th>
              <th>رقم الهوية</th>
              <th>الهاتف</th>
              <th>البريد الإلكتروني</th>
              <th>عدد الوحدات</th>
              <th>الحالة</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let owner of owners">
              <td>
                <div class="fw-bold">{{ owner.fullName }}</div>
              </td>
              <td>{{ owner.nationalId }}</td>
              <td>{{ owner.phone }}</td>
              <td>{{ owner.email || '-' }}</td>
              <td>
                <span class="badge bg-info">0</span>
              </td>
              <td>
                <app-status-badge [status]="owner.status"></app-status-badge>
              </td>
              <td>
                <div class="btn-group btn-group-sm" role="group">
                  <a
                    class="btn btn-action-view"
                    [routerLink]="['/app/accounting/statement/owner', owner.id]"
                    title="كشف الحساب">
                    <i class="bi bi-receipt"></i>
                  </a>
                  <button
                    *appHasPermission="[Permission.OWNERS_WRITE]"
                    class="btn btn-action-edit"
                    [routerLink]="['edit', owner.id]"
                    title="تعديل">
                    <i class="bi bi-pencil-fill"></i>
                  </button>
                  <button
                    *appHasPermission="[Permission.OWNERS_WRITE]"
                    class="btn btn-action-delete"
                    (click)="deleteOwner(owner)"
                    title="حذف">
                    <i class="bi bi-trash-fill"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </ng-container>
  </div>
</div>

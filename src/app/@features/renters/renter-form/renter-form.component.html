<app-page-header
  [title]="isEditMode ? 'تعديل مستأجر' : 'إضافة مستأجر جديد'"
  icon="bi-person-plus"
  [breadcrumbs]="[
    {label: 'المستأجرون', url: '/app/renters'},
    {label: isEditMode ? 'تعديل' : 'جديد'}
  ]"
  [showActions]="false">
</app-page-header>

<div class="card" dir="rtl">
  <div class="card-body">
    <form [formGroup]="renterForm" (ngSubmit)="onSubmit()">
      <!-- Personal Info -->
      <h5 class="mb-3 text-brand">المعلومات الشخصية</h5>
      <div class="row g-3 mb-4">
        <!-- Full Name -->
        <div class="col-md-6">
          <label class="form-label">الاسم الكامل <span class="text-danger">*</span></label>
          <input
            type="text"
            class="form-control"
            formControlName="fullName"
            [class.is-invalid]="renterForm.get('fullName')?.invalid && renterForm.get('fullName')?.touched"
            placeholder="أدخل الاسم الكامل">
          <div class="invalid-feedback">
            {{ getErrorMessage('fullName') }}
          </div>
        </div>

        <!-- Phone -->
        <div class="col-md-6">
          <label class="form-label">رقم الجوال <span class="text-danger">*</span></label>
          <input
            type="tel"
            class="form-control"
            formControlName="phone"
            [class.is-invalid]="renterForm.get('phone')?.invalid && renterForm.get('phone')?.touched"
            placeholder="05xxxxxxxx"
            maxlength="10">
          <div class="invalid-feedback">
            {{ getErrorMessage('phone') }}
          </div>
        </div>

        <!-- ID Type -->
        <div class="col-md-4">
          <label class="form-label">نوع الوثيقة <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="idType">
            <option *ngFor="let type of idTypes" [value]="type.value">{{ type.label }}</option>
          </select>
        </div>

        <!-- National ID / Residency / Commercial Record -->
        <div class="col-md-4">
          <label class="form-label">رقم الوثيقة</label>
          <input
            type="text"
            class="form-control"
            formControlName="nationalId"
            [class.is-invalid]="renterForm.get('nationalId')?.invalid && renterForm.get('nationalId')?.touched"
            placeholder="1234567890"
            maxlength="10">
          <div class="invalid-feedback">
            {{ getErrorMessage('nationalId') }}
          </div>
        </div>

        <!-- Nationality -->
        <div class="col-md-4">
          <label class="form-label">الجنسية</label>
          <input
            type="text"
            class="form-control"
            formControlName="nationality"
            placeholder="مثال: سعودي">
        </div>

        <!-- Birth Date -->
        <div class="col-md-4">
          <label class="form-label">تاريخ الميلاد (ميلادي)</label>
          <input
            type="date"
            class="form-control"
            formControlName="birthDate">
        </div>

        <!-- Marital Status -->
        <div class="col-md-4">
          <label class="form-label">الحالة الاجتماعية</label>
          <select class="form-select" formControlName="maritalStatus">
            <option [ngValue]="null">-- اختر --</option>
            <option *ngFor="let status of maritalStatuses" [value]="status.value">{{ status.label }}</option>
          </select>
        </div>

        <!-- Family Member Count (only if married) -->
        <div class="col-md-4" *ngIf="isMarried">
          <label class="form-label">عدد أفراد الأسرة</label>
          <input
            type="number"
            class="form-control"
            formControlName="familyMemberCount"
            min="1"
            placeholder="عدد الأفراد">
        </div>
      </div>

      <!-- Work Info -->
      <h5 class="mb-3 text-brand">معلومات العمل</h5>
      <div class="row g-3 mb-4">
        <div class="col-md-12">
          <label class="form-label">جهة العمل</label>
          <input
            type="text"
            class="form-control"
            formControlName="employer"
            placeholder="اسم الشركة أو جهة العمل">
        </div>
      </div>

      <!-- Emergency Contact -->
      <h5 class="mb-3 text-brand">جهة اتصال الطوارئ</h5>
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">اسم جهة الاتصال</label>
          <input
            type="text"
            class="form-control"
            formControlName="emergencyContact"
            placeholder="اسم الشخص">
        </div>

        <div class="col-md-6">
          <label class="form-label">رقم الهاتف</label>
          <input
            type="tel"
            class="form-control"
            formControlName="emergencyPhone"
            [class.is-invalid]="renterForm.get('emergencyPhone')?.invalid && renterForm.get('emergencyPhone')?.touched"
            placeholder="05xxxxxxxx"
            maxlength="10">
          <div class="invalid-feedback">
            {{ getErrorMessage('emergencyPhone') }}
          </div>
        </div>
      </div>

      <!-- Notes -->
      <h5 class="mb-3 text-brand">ملاحظات</h5>
      <div class="row g-3 mb-4">
        <div class="col-md-12">
          <label class="form-label">ملاحظات</label>
          <textarea
            class="form-control"
            formControlName="notes"
            rows="3"
            placeholder="أدخل أي ملاحظات إضافية"></textarea>
        </div>
      </div>

      <hr class="my-4">

      <!-- Actions -->
      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="loading">
          إلغاء
        </button>
        <button type="submit" class="btn btn-brand" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ isEditMode ? 'حفظ التعديلات' : 'إضافة المستأجر' }}
        </button>
      </div>

      <div *ngIf="!isEditMode" class="alert alert-info mt-3" role="alert">
        <strong>ملاحظة:</strong> عند إضافة مستأجر جديد، سيتم إنشاء حساب خاص به تلقائياً وستظهر بيانات الدخول في نافذة منبثقة.
      </div>
    </form>
  </div>
</div>

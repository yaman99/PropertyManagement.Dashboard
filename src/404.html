<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>Omar Almarbie Real Estate</title>
  <!--
    GitHub Pages SPA Routing Fix
    When GitHub Pages returns 404 for a client-side route (e.g. /app/dashboard),
    this page redirects to /?p=/app/dashboard so index.html can restore it.
    pathSegmentsToKeep = 1 → keeps /PropertyManagement.Dashboard in the path.
  -->
  <script>
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>

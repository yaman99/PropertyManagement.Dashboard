<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#BC8545" opacity="0.1"/>

  <!-- Building icon -->
  <g fill="#BC8545">
    <!-- Main building -->
    <rect x="60" y="60" width="80" height="100" rx="4"/>

    <!-- Windows -->
    <rect x="70" y="70" width="15" height="15" fill="#FFF9F0"/>
    <rect x="92.5" y="70" width="15" height="15" fill="#FFF9F0"/>
    <rect x="115" y="70" width="15" height="15" fill="#FFF9F0"/>

    <rect x="70" y="92.5" width="15" height="15" fill="#FFF9F0"/>
    <rect x="92.5" y="92.5" width="15" height="15" fill="#FFF9F0"/>
    <rect x="115" y="92.5" width="15" height="15" fill="#FFF9F0"/>

    <rect x="70" y="115" width="15" height="15" fill="#FFF9F0"/>
    <rect x="92.5" y="115" width="15" height="15" fill="#FFF9F0"/>
    <rect x="115" y="115" width="15" height="15" fill="#FFF9F0"/>

    <!-- Door -->
    <rect x="85" y="135" width="30" height="25" fill="#855D30"/>
  </g>

  <!-- Brand text -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#855D30" text-anchor="middle">OMAR ALMARBIE</text>
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="10"
        fill="#BC8545" text-anchor="middle">Real Estate</text>
</svg>
